services:

  # ── Django Backend ───────────────────────────────────────────────────────────
  - type: web
    name: taskflow-backend
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 60 --log-level info"
    plan: free
    healthCheckPath: /api/docs/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DEBUG
        value: "False"

  # ── React Frontend ───────────────────────────────────────────────────────────
  - type: web
    name: taskflow-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: ./dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    
 
